 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>AAZ Visa - Candidate Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100">
    <div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg">
        <h2 class="text-2xl font-bold text-center text-navy-900 mb-6">Candidate Login</h2>
        <input type="tel" id="userPhone" placeholder="Enter Registered WhatsApp No" class="w-full p-3 border rounded mb-4">
        <button onclick="checkStatus()" class="w-full bg-blue-900 text-white p-3 rounded font-bold">Track Status</button>
        
        <div id="statusResult" class="mt-8 hidden">
            <h3 class="font-bold border-b pb-2">Status: <span id="currentStatus" class="text-green-600">Processing</span></h3>
            <div class="mt-4 space-y-4">
                <p class="text-sm"><i class="fas fa-check-circle text-green-500"></i> Documents Submitted</p>
                <p class="text-sm text-gray-400"><i class="fas fa-circle"></i> VFS Appointment (Pending)</p>
            </div>
        </div>
    </div>
</body>
</html>
