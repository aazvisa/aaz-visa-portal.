<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAZ Visa Export - Global Travel Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #daa520; --navy: #001f3f; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }

        /* Header (Original Style) */
        header { background: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--gold); position: sticky; top:0; z-index: 4000; }
        .logo-img { width: 70px; mix-blend-mode: multiply; }

        /* Slider (Puri Badi Photo Fix) */
        .hero-section { width: 100%; height: 80vh; position: relative; overflow: hidden; background: #000; }
        .slides { display: flex; width: 400%; height: 100%; animation: slideShow 20s infinite; }
        .slide { width: 25%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        @keyframes slideShow { 
            0%, 20% { transform: translateX(0%); }
            25%, 45% { transform: translateX(-25%); }
            50%, 70% { transform: translateX(-50%); }
            75%, 100% { transform: translateX(-75%); }
        }

        .hero-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; width: 100%; }
        .founder-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--gold); margin-bottom: 10px; }

        /* Stats Dashboard (Wahi Purana Wala) */
        .stats-bar { background: var(--navy); color: white; display: flex; justify-content: space-around; padding: 20px; border-bottom: 4px solid var(--gold); }
        .stat-box h2 { color: var(--gold); margin: 0; }

        /* Grid & Cards */
        .container { padding: 30px 15px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .service-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .service-card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; }
        .btn-action { background: var(--gold); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="1000070395.webp" class="logo-img">
        <span style="font-weight:900; color:var(--navy);">AAZ VISA EXPORT</span>
    </div>
    <div style="text-align:right; font-size:12px;">+91 8818852109</div>
</header>

<div class="hero-section">
    <div class="slides">
        <div class="slide"><img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=1200"></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1200"></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1548013146-72479768bbaa?q=80&w=1200"></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?q=80&w=1200"></div>
    </div>
    <div class="hero-overlay">
        <img src="1000070399.webp" class="founder-img">
        <h1 style="text-shadow: 2px 2px 4px #000;">Abhishekk Ahirwar</h1>
        <p style="background:rgba(0,0,0,0.5); display:inline-block; padding:5px 10px;">Founder & CEO</p>
    </div>
</div>

<div class="stats-bar">
    <div class="stat-box"><h2 id="exp">0</h2><p>Years Exp.</p></div>
    <div class="stat-box"><h2 id="visa">0</h2><p>Visas</p></div>
    <div class="stat-box"><h2 id="clients">0</h2><p>Clients</p></div>
</div>

<div style="text-align:center; padding: 20px;">
    <a href="portal.html" style="background:var(--navy); color:var(--gold); padding:15px 30px; text-decoration:none; border-radius:50px; font-weight:bold; border:2px solid var(--gold);">OPEN CANDIDATE PORTAL</a>
</div>

<div class="container">
    <div class="grid">
        <div class="service-card">
            <img src="https://images.unsplash.com/photo-1521737711867-e3b97375f902?q=80&w=600">
            <div class="card-body"><h3>Work Permit Visa</h3><button class="btn-action" onclick="openForm('Work Permit')">Apply Now</button></div>
        </div>

        <div class="service-card">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=600">
            <div class="card-body"><h3>Holiday Package</h3><button class="btn-action" onclick="openForm('Holiday Package')">Choose Country</button></div>
        </div>

        <div class="service-card">
            <img src="https://images.unsplash.com/photo-1586762413150-da765e921381?q=80&w=600">
            <div class="card-body"><h3>Passport & CV</h3><button class="btn-action" onclick="openCVForm()">Select Service</button></div>
        </div>
    </div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-box">
        <h3 id="mTitle" style="text-align:center;">Registration</h3>
        <form action="https://formspree.io/f/meeprqpk" method="POST">
            <input type="hidden" name="Service" id="sHidden">
            <input type="text" name="Name" placeholder="Name" required>
            <input type="tel" name="WhatsApp" placeholder="WhatsApp Number" required>
            
            <div id="countryList">
                <select name="Country">
                    <option value="Poland">Poland 🇵🇱</option>
                    <option value="Italy">Italy 🇮🇹</option>
                    <option value="Nepal">Nepal 🇳🇵</option>
                    <option value="Sri Lanka">Sri Lanka 🇱🇰</option>
                    <option value="France">France 🇫🇷</option>
                    <option value="Japan">Japan 🇯🇵</option>
                    <option value="USA">USA 🇺🇸</option>
                    <option value="Italy">Italy 🇮🇹</option>
                    <option value="Hungary">Hungary 🇭🇺</option>
                    <option value="Dubai">Dubai 🇦🇪</option>
                    <option value="Russia">Russia 🇷🇺</option>
                    <option value="Malta">Malta </option>
                    <option value="UK">UK🇬🇧</option>
                    <option value="Thailand">Thailand 🇹🇭</option>
                    <option value="Malaysia">Malaysia 🇲🇾</option>
                    <option value="Vietnam">Vietnam 🇻🇳</option>
                    <option value="Singapore">Singapore 🇸🇬</option>
                    <option value="Sri Lanka">Sri Lanka 🇱🇰</option>
                    <option value="Laos">Laos 🇱🇦</option>
                    <option value="Azerbaijan">Azerbaijan 🇦🇿</option>
                    <option value="Georgia">Georgia 🇬🇪</option>
                    <option value="Cambodia">Cambodia 🇰🇭</option>
                    <option value="Egypt">Egypt 🇪🇬</option>
                    <option value="Spain">Spain 🇪🇸</option>
                    <option value="Japan">Japan 🇯🇵</option>
                    <option value="Switzerland">Switzerland 🇨🇭</option>
                    <option value="Turkey">Turkey 🇹🇷</option>
                    <<option value="Europe29">Europe (29 Countries) </option>
                        <option value="Other">Other 190+Countries</option>
                    
                </select>
            </div>

            <div id="cvList" style="display:none;">
                <select name="Document">
                    <option value="New Passport">New Passport</option>
                    <option value="Europass CV">Europass CV</option>
                    <option value="ATS CV">ATS CV</option>
                </select>
            </div>

            <button type="submit" class="btn-action" style="margin-top:10px;">Submit Details</button>
            <p onclick="closeModal()" style="text-align:center; color:red; cursor:pointer;">Close</p>
        </form>
    </div>
</div>

<script>
    function openForm(s) { 
        document.getElementById('sHidden').value=s; 
        document.getElementById('mTitle').innerText=s; 
        document.getElementById('cvList').style.display='none';
        document.getElementById('countryList').style.display='block';
        document.getElementById('mainModal').style.display='flex'; 
    }
    function openCVForm() {
        document.getElementById('sHidden').value='Passport & CV';
        document.getElementById('mTitle').innerText='Passport & CV Service';
        document.getElementById('countryList').style.display='none';
        document.getElementById('cvList').style.display='block';
        document.getElementById('mainModal').style.display='flex';
    }
    function closeModal() { document.getElementById('mainModal').style.display='none'; }

    function count(id, max) {
        let c=0; let e=document.getElementById(id);
        let i=setInterval(()=>{ if(c<max){ c+=Math.ceil(max/40); if(c>max)c=max; e.innerText=c+"+"; }else clearInterval(i); }, 40);
    }
    window.onload = () => { count('exp', 3); count('visa', 1842); count('clients', 1673); };
</script>
</body>
</html>
