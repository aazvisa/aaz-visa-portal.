<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAZ Visa Export - Founder Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background: #001f3f; color: white; margin: 0; padding: 0; text-align: center; }
        .container { background: rgba(0, 51, 102, 0.9); width: 90%; max-width: 500px; margin: 20px auto; padding: 20px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 2px solid #daa520; }
        .user-photo { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #daa520; object-fit: cover; margin-bottom: 10px; }
        .logo { width: 120px; margin-bottom: 10px; }
        h1 { margin: 10px 0 5px; color: #daa520; font-size: 22px; text-transform: uppercase; }
        .tagline { color: #ccc; font-style: italic; margin-bottom: 20px; font-size: 14px; }
        .form-section { background: white; color: black; padding: 15px; border-radius: 15px; text-align: left; }
        .form-section h3 { text-align: center; color: #003366; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background: #daa520; color: #001f3f; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .social-links { margin: 25px 0; padding-top: 15px; border-top: 1px solid #444; }
        .social-links p { margin-bottom: 15px; color: #daa520; font-weight: bold; }
        .social-links a { font-size: 35px; margin: 0 15px; text-decoration: none; display: inline-block; transition: 0.3s; }
        .fa-instagram { color: #E1306C; }
        .fa-facebook { color: #4267B2; }
        .fa-whatsapp { color: #25D366; }
    </style>
</head>
<body>

<div class="container">
    <img src="1000070395.webp" alt="AAZ Logo" class="logo">
    
    <img src="1000070399.webp" alt="Abhishek Ahirwar" class="user-photo">
    <h1>Abhishek Ahirwar</h1>
    <p class="tagline">Founder & CEO - AAZ Visa Export</p>

    <div class="form-section">
        <h3>Visa Enquiry Form</h3>
        <form action="https://formspree.io/f/meeprqpk" method="POST">
            <input type="text" name="name" placeholder="Aapka Naam" required>
            <input type="tel" name="phone" placeholder="WhatsApp Number" required>
            <select name="country" required>
                <option value="">Desh Chunein (Select Country)</option>
                <option value="Poland">Poland</option>
                <option value="Italy">Italy</option>
                <option value="Malta">Malta</option>
                <option value="Hungary">Hungary</option>
                <option value="Lithuania">Lithuania</option>
            </select>
            <button type="submit">Submit Details</button>
        </form>
    </div>

    <div class="social-links">
        <p>Connect With Us:</p>
        <a href="https://www.instagram.com/aaz.visa_export?igsh=MTl5NGRxeHp4ankyMw==" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/1EnKXFoDBm/" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://wa.link/0d1cm6" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://whatsapp.com/channel/0029VbBfeqS17EmlmkD2i13D" target="_blank"><i class="fas fa-bullhorn" style="color: #25D366;"></i></a>
    </div>
</div>
</body>
</html>
