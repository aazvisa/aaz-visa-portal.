<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Super Admin - AAZ Visa Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white flex">
    <div class="w-64 bg-[#001f3f] h-screen p-6 border-r border-white/10">
        <h2 class="text-2xl font-bold text-[#daa520] mb-10">AAZ Master</h2>
        <nav class="space-y-4">
            <a href="#" class="block p-3 bg-blue-800 rounded"><i class="fas fa-tachometer-alt mr-2"></i> Dashboard</a>
            <a href="#" class="block p-3 hover:bg-blue-800 rounded"><i class="fas fa-users mr-2"></i> Employees</a>
            <a href="#" class="block p-3 hover:bg-blue-800 rounded"><i class="fas fa-file-invoice mr-2"></i> Documents (Watermark)</a>
            <a href="#" class="block p-3 hover:bg-blue-800 rounded"><i class="fas fa-edit mr-2"></i> Edit Site Stats</a>
        </nav>
    </div>

    <div class="flex-1 p-10">
        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="bg-blue-600 p-6 rounded-2xl">
                <p>Live Visitors</p>
                <h3 class="text-4xl font-bold">12</h3>
            </div>
            <div class="bg-green-600 p-6 rounded-2xl">
                <p>Total Visa Grant</p>
                <h3 class="text-4xl font-bold">542+</h3>
            </div>
            <div class="bg-purple-600 p-6 rounded-2xl">
                <p>Pending Leads</p>
                <h3 class="text-4xl font-bold">28</h3>
            </div>
        </div>

        <div class="bg-[#001f3f] p-8 rounded-2xl border border-white/10">
            <h2 class="text-xl font-bold mb-6">Issue New Employee ID</h2>
            <div class="flex gap-4">
                <input type="text" placeholder="Employee Name" class="bg-slate-800 p-3 rounded w-full border border-white/20">
                <input type="text" placeholder="Assign ID (e.g. AAZ-01)" class="bg-slate-800 p-3 rounded w-full border border-white/20">
                <button class="bg-[#daa520] px-8 py-3 rounded font-bold text-black">Generate</button>
            </div>
        </div>
    </div>
</body>
</html>
